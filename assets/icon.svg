    <line x1="0" y1="160" x2="180" y2="160" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="180" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="0" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="20" y1="0" x2="20" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="40" y1="0" x2="40" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
