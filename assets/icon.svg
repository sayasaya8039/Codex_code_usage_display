    <line x1="80" y1="0" x2="80" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="140" y1="0" x2="140" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="180" stroke="#7c3aed" stroke-width="0.5"/>
  </g>
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#innerGlow)"/>
  <polygon points="90,18 152,54 152,126 90,162 28,126 28,54" fill="none" stroke="url(#strokeGrad)" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>
