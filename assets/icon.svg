  <circle cx="152" cy="126" r="3" fill="#22d3ee" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="90" cy="162" r="3" fill="#a78bfa" opacity="0.8" filter="url(#softGlow)"/>
